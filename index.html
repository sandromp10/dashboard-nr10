<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard NR10 - Automático</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; margin:30px; }
h1 { text-align:center; }

.painel {
    display:flex;
    justify-content:space-around;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.card {
    padding:15px;
    border-radius:8px;
    width:200px;
    text-align:center;
    color:white;
    margin:5px;
}

.total{background:#1f4e79;}
.vigente{background:#198754;}
.alerta{background:#ffc107; color:black;}
.vencido{background:#dc3545;}

table {
    border-collapse:collapse;
    width:100%;
    margin-top:15px;
}

th, td {
    border:1px solid #ccc;
    padding:6px;
    text-align:center;
}

thead { background:#1f4e79; color:white; }

.vigente-row{background:#d4edda;}
.alerta-row{background:#fff3cd;}
.vencido-row{background:#f8d7da;}

canvas{
    max-width:400px;
    margin:20px auto;
    display:block;
}
</style>
</head>

<body>

<h1>Painel de Gestão NR10</h1>

<div class="painel">
<div class="card total" id="total">Total: 0</div>
<div class="card vigente" id="vigentes">Vigentes: 0</div>
<div class="card alerta" id="alertas">Alerta: 0</div>
<div class="card vencido" id="vencidos">Vencidos: 0</div>
</div>

<canvas id="grafico"></canvas>

<table id="tabela">
<thead>
<tr>
<th>Nome</th>
<th>Status Geral</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

function calcular(dataTexto){
    const hoje=new Date();
    const p=dataTexto.split("/");
    const d=new Date(p[2],p[1]-1,p[0]);
    d.setFullYear(d.getFullYear()+2);
    return Math.ceil((d-hoje)/(1000*60*60*24));
}

fetch('dados_nr10.xlsx')
.then(res=>res.arrayBuffer())
.then(data=>{
    const workbook=XLSX.read(data,{type:'array'});
    const sheet=workbook.Sheets[workbook.SheetNames[0]];
    const json=XLSX.utils.sheet_to_json(sheet);

    let contV=0, contA=0, contX=0;

    json.forEach(row=>{
        let diasB=calcular(row.NR10_Basico);
        let diasS=calcular(row.NR10_SEP);

        let status="VIGENTE";
        let classe="vigente-row";

        [diasB,diasS].forEach(d=>{
            if(d<0){ status="VENCIDO"; classe="vencido-row"; }
            else if(d<=60 && status!=="VENCIDO"){
                status="ALERTA";
                classe="alerta-row";
            }
        });

        if(status==="VIGENTE") contV++;
        if(status==="ALERTA") contA++;
        if(status==="VENCIDO") contX++;

        document.querySelector("#tabela tbody").innerHTML+=
        `<tr class="${classe}">
            <td>${row.Nome}</td>
            <td>${status}</td>
        </tr>`;
    });

    let total=contV+contA+contX;

    document.getElementById("total").innerText="Total: "+total;
    document.getElementById("vigentes").innerText="Vigentes: "+contV;
    document.getElementById("alertas").innerText="Alerta: "+contA;
    document.getElementById("vencidos").innerText="Vencidos: "+contX;

    new Chart(document.getElementById("grafico"),{
        type:"doughnut",
        data:{
            labels:["Vigentes","Alerta","Vencidos"],
            datasets:[{data:[contV,contA,contX]}]
        }
    });
});

</script>

</body>
</html>
