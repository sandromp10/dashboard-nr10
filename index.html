<!-- Biblioteca XLSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<button id="btnExportar">Exportar Colunas Selecionadas</button>

<script>

async function exportarColunasSelecionadas() {
    try {
        const response = await fetch("dados_nr10.xlsx");
        const data = await response.arrayBuffer();

        const workbook = XLSX.read(data, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        
        // Lê todas as linhas como array bruto
        const linhas = XLSX.utils.sheet_to_json(sheet, { header: 1 });

        // Índices das colunas desejadas
        const colunas = [0, 3, 5, 8, 9, 15, 16]; 
        // A=0, D=3, F=5, I=8, J=9, P=15, Q=16

        // Filtra apenas essas colunas
        const dadosFiltrados = linhas.map(linha =>
            colunas.map(indice => linha[indice] || "")
        );

        // Cria nova planilha
        const novaSheet = XLSX.utils.aoa_to_sheet(dadosFiltrados);
        const novoWorkbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(novoWorkbook, novaSheet, "Exportado");

        // Faz download
        XLSX.writeFile(novoWorkbook, "exportacao_filtrada_nr10.xlsx");

    } catch (erro) {
        console.error("Erro na exportação:", erro);
        alert("Erro ao exportar. Verifique o console.");
    }
}

// Evento do botão
document.getElementById("btnExportar")
        .addEventListener("click", exportarColunasSelecionadas);

</script>
