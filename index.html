<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.card{
    background:#1f4e79;
    color:white;
    padding:15px;
    border-radius:8px;
    width:200px;
    text-align:center;
    margin-bottom:20px;
}

.table-container{
    overflow-x:auto;
    background:white;
    padding:10px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

table{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
}

th,td{
    padding:8px;
    border:1px solid #ddd;
    text-align:left;
}

th{
    background:#1f4e79;
    color:white;
}
</style>

<h1>Dashboard NR10</h1>

<div class="card">
    Total Registros: <span id="total">0</span>
</div>

<div class="table-container">
<table>
    <thead>
        <tr>
            <th>Nome</th>
            <th>Data Admissão</th>
            <th>Cargo</th>
            <th>NR10 Básico</th>
            <th>Reciclagem Básico</th>
            <th>NR10 SEP</th>
            <th>Reciclagem SEP</th>
        </tr>
    </thead>
    <tbody id="corpo"></tbody>
</table>
</div>

<script>

async function carregarDashboard(){

    const response = await fetch("dados_nr10.xlsx");
    const data = await response.arrayBuffer();

    const workbook = XLSX.read(data,{type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const linhas = XLSX.utils.sheet_to_json(sheet,{header:1});

    // Colunas desejadas
    const colunas = [0,3,5,8,9,15,16];

    const corpo = document.getElementById("corpo");
    corpo.innerHTML = "";

    let total = 0;

    linhas.slice(1).forEach(linha=>{

        if(!linha.length) return;

        const tr = document.createElement("tr");

        colunas.forEach(indice=>{
            const td = document.createElement("td");
            td.textContent = linha[indice] || "";
            tr.appendChild(td);
        });

        corpo.appendChild(tr);
        total++;

    });

    document.getElementById("total").textContent = total;
}

carregarDashboard();

</script>

<script>     

function converterDataExcel(valor){

    // Se for número (data serial do Excel)
    if(typeof valor === "number"){
        const data = new Date((valor - 25569) * 86400 * 1000);
        const dia = String(data.getDate()).padStart(2,'0');
        const mes = String(data.getMonth()+1).padStart(2,'0');
        const ano = data.getFullYear();
        return `${dia}/${mes}/${ano}`;
    }

    // Se já estiver texto, retorna normal
    return valor || "";
}

async function carregarDashboard(){

    const response = await fetch("dados_nr10.xlsx");
    const data = await response.arrayBuffer();

    const workbook = XLSX.read(data,{type:"array"});
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const linhas = XLSX.utils.sheet_to_json(sheet,{header:1});

    const colunas = [0,3,5,8,9,15,16];
    const corpo = document.getElementById("corpo");
    corpo.innerHTML = "";

    let total = 0;

    linhas.slice(1).forEach(linha=>{

        if(!linha.length) return;

        const tr = document.createElement("tr");

        colunas.forEach(indice=>{

            const td = document.createElement("td");
            let valor = linha[indice];

            // Converte datas automaticamente
            td.textContent = converterDataExcel(valor);

            tr.appendChild(td);
        });

        corpo.appendChild(tr);
        total++;
    });

    document.getElementById("total").textContent = total;
}

carregarDashboard();

// Executa ao carregar página
importarPlanilha();

</script>
