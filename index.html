<script>
fetch("dados_nr10.xlsx")
  .then(res => res.arrayBuffer())
  .then(data => {
    const workbook = XLSX.read(data, { type: "array" });
    const sheet = workbook.Sheets[workbook.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

    // Índices das colunas desejadas
    const colunasDesejadas = [0, 3, 5, 8, 9, 15, 16]; 
    // A=0, D=3, F=5, I=8, J=9, P=15, Q=16

    const dadosFiltrados = rows.map(row =>
      colunasDesejadas.map(index => row[index] || "")
    );

    console.log(dadosFiltrados);

    // Exemplo de exibição na tabela
    const tbody = document.querySelector("tbody");
    dadosFiltrados.slice(1).forEach(linha => {
      const tr = document.createElement("tr");
      linha.forEach(celula => {
        const td = document.createElement("td");
        td.textContent = celula;
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
  });
</script>
